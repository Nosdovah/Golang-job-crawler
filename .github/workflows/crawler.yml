name: Automated Go Crawler & Deploy

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * *' # Automatically crawls jobs daily at midnight UTC
  workflow_dispatch: # Allows you to manually click a button on GitHub to crawl now

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Crawl and generate data.json
        # RemoteOK and other APIs block GitHub Actions IPs (Cloudflare 403)
        # So we deploy the locally built data.json instead of fetching on the server.
        run: echo "Deploying locally cached data.json"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './static'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
